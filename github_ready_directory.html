<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directory</title>

<style>
body { margin:0; background:#000; color:#fff; font-family:Arial; }
#screen { width:100%; height:100vh; padding:40px; box-sizing:border-box; }
.header { display:flex; justify-content:space-between; }
.title-line-1 { font-size:80px; font-weight:bold; }
.title-line-2 { font-size:40px; }
.title-line-3 { font-size:28px; opacity:.7; }
.time { font-size:32px; text-align:right; }
.city { font-size:16px; }
.weather { font-size:14px; }

.row { margin-top:20px; }
.suite { font-size:20px; }
.tenant { font-size:28px; }
.sub { font-size:16px; opacity:.7; }

.managed { position:absolute; bottom:40px; width:100%; text-align:center; font-size:24px; opacity:.6; }
</style>
</head>

<body>

<div id="screen">

<div class="header">
  <div>
    <div id="building-number">110</div>
    <div id="building-street">29TH AVENUE</div>
    <div id="building-direction">NORTH</div>
  </div>

  <div>
    <div id="time">--:--</div>
    <div id="city">NASHVILLE TN</div>
    <div id="weather">--</div>
  </div>
</div>

<div id="directory"></div>

<div class="managed" id="managed">MANAGED BY</div>

</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1O_8s-4uoGnKGaWkPHQ2yYXStX1OVBjJsmK7DC3oYWJ4/gviz/tq?tqx=out:csv";

function parseCSV(t){
 return t.split("\n").map(r=>r.split(","));
}

function load(){
 fetch(URL + "&t=" + Date.now())
 .then(r=>r.text())
 .then(t=>{
   const rows = parseCSV(t);
   let data = {};
   rows.forEach(r=>{
     if(r[1]) data[r[1]] = r[3];
   });

   apply(data);
 });
}

function apply(d){
 document.getElementById("building-number").innerHTML = d.building_number || "110";
 document.getElementById("building-street").innerHTML = d.building_street || "";
 document.getElementById("building-direction").innerHTML = d.building_direction || "";

 document.getElementById("managed").innerHTML = d.managed_by_text || "";

 let html="";
 for(let i=1;i<=3;i++){
  html+=`
   <div class="row">
    <div class="suite">${d["suite_"+i]||""}</div>
    <div class="tenant">${d["tenant_"+i]||""}
     <div class="sub">${(d["subtext_"+i]||"").replace("|","<br>")}</div>
    </div>
   </div>`;
 }
 document.getElementById("directory").innerHTML = html;
}

function time(){
 let d=new Date();
 let h=d.getHours()%12||12;
 let m=("0"+d.getMinutes()).slice(-2);
 let am=d.getHours()>=12?"PM":"AM";
 document.getElementById("time").innerHTML=h+":"+m+" "+am;
}

setInterval(load,5000);
setInterval(time,1000);

load();
time();
</script>

</body>
</html>
