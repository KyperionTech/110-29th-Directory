<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Directory</title>

<style>
html, body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Helvetica, Arial;
}

#screen {
  width:2160px;
  height:3840px;
  position:relative;
}

.header {position:absolute; top:120px; left:140px; right:140px;}
.meta {position:absolute; right:0; top:0; text-align:right;}

.time {font-size:76px;}
.city {font-size:28px;}

.directory-shell {position:absolute; top:720px; left:140px; right:140px;}

.row {padding:40px 0; border-bottom:1px solid rgba(255,255,255,.2);}
.suite {font-size:34px;}
.tenant {font-size:46px;}

.managed {
  position:absolute;
  bottom:180px;
  width:100%;
  text-align:center;
  font-size:52px;
}
</style>
</head>

<body>

<div id="screen">

<div class="header">
  <div>
    <div id="building-number">110</div>
    <div id="building-street">29TH AVENUE</div>
    <div id="building-direction">NORTH</div>
  </div>

  <div class="meta">
    <div id="time">--:--</div>
    <div id="city">NASHVILLE TN</div>
  </div>
</div>

<div class="directory-shell" id="directory"></div>

<div class="managed" id="managed">MANAGED BY</div>

</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1O_8s-4uoGnKGaWkPHQ2yYXStX1OVBjJsmK7DC3oYWJ4/export?format=csv";

/* SAFE CSV PARSER */
function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    let char = text[i];
    let next = text[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(cell);
      cell = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
        row = [];
        cell = '';
      }
    } else {
      cell += char;
    }
  }

  if (cell || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

/* LOAD DATA */
function load(){
 fetch(URL + "&t=" + Date.now())
 .then(r=>r.text())
 .then(t=>{
   const rows = parseCSV(t);
   let data = {};

   for (let i = 1; i < rows.length; i++) {
     let row = rows[i];

     let key = row[1];
     let value = row[3];

     if(key){
       data[key.trim()] = (value || "").trim();
     }
   }

   apply(data);
 })
 .catch(e=>{
   console.log("ERROR:", e);
 });
}

/* APPLY */
function apply(d){

 set("building-number", d.building_number);
 set("building-street", d.building_street);
 set("building-direction", d.building_direction);
 set("managed", d.managed_by_text);

 let html="";
 for(let i=1;i<=3;i++){
  html+=`
   <div class="row">
    <div class="suite">${d["suite_"+i]||""}</div>
    <div class="tenant">${d["tenant_"+i]||""}</div>
   </div>`;
 }

 document.getElementById("directory").innerHTML = html;
}

/* HELPERS */
function set(id,val){
 if(val) document.getElementById(id).innerHTML = val;
}

/* TIME */
function updateTime(){
 let d=new Date();
 let h=d.getHours()%12||12;
 let m=("0"+d.getMinutes()).slice(-2);
 let am=d.getHours()>=12?"PM":"AM";
 document.getElementById("time").innerHTML=h+":"+m+" "+am;
}

/* INIT */
setInterval(load,5000);
setInterval(updateTime,1000);

load();
updateTime();
</script>

</body>
</html>
