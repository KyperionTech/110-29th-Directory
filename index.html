<script>
const URL = "https://docs.google.com/spreadsheets/d/1O_8s-4uoGnKGaWkPHQ2yYXStX1OVBjJsmK7DC3oYWJ4/gviz/tq?tqx=out:csv";

function load(){
 fetch(URL + "&t=" + Date.now())
 .then(r=>r.text())
 .then(t=>{
   console.log("RAW CSV:", t); // DEBUG

   let rows = t.split("\n");
   let data = {};

   rows.forEach(r=>{
     let c = r.split(",");

     // FLEXIBLE PARSING (THIS FIXES YOUR ISSUE)
     let key = c[0] || c[1];
     let value = c[1] || c[3];

     if(key && value){
       key = key.trim().replace(/"/g,'');
       value = value.trim().replace(/"/g,'');

       data[key] = value;
     }
   });

   console.log("PARSED DATA:", data); // DEBUG

   apply(data);
 });
}

function apply(d){

 // HEADER
 set("building-number", d.building_number);
 set("building-street", d.building_street);
 set("building-direction", d.building_direction);

 // MANAGED
 set("managed", d.managed_by_text);

 // DIRECTORY
 let html="";
 for(let i=1;i<=3;i++){
  html+=`
   <div class="row">
    ${d["suite_"+i]||""} — ${d["tenant_"+i]||""}
   </div>`;
 }

 document.getElementById("directory").innerHTML = html;
}

function set(id,val){
 if(val) document.getElementById(id).innerHTML = val;
}

function time(){
 let d=new Date();
 let h=d.getHours()%12||12;
 let m=("0"+d.getMinutes()).slice(-2);
 let am=d.getHours()>=12?"PM":"AM";
 document.getElementById("time").innerHTML=h+":"+m+" "+am;
}

setInterval(load,5000);
setInterval(time,1000);

load();
time();
</script>
