<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directory</title>

<style>
html, body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Helvetica, Arial, sans-serif;
  overflow:hidden;
}

#screen {
  width:2160px;
  height:3840px;
  position:relative;
}

/* HEADER */
.header {position:absolute; top:120px; left:140px; right:140px;}
.title-line-1 {font-size:170px; font-weight:700;}
.title-line-2 {font-size:82px;}
.title-line-3 {font-size:52px; opacity:.7;}

.meta {position:absolute; right:0; top:0; text-align:right;}
.time {font-size:76px;}
.city {font-size:28px;}
.weather {font-size:24px;}

/* DIRECTORY */
.directory-shell {position:absolute; top:720px; left:140px; right:140px;}
.row {padding:42px 0; border-bottom:1px solid rgba(255,255,255,.2);}
.suite {font-size:34px;}
.tenant {font-size:46px;}
.sub {font-size:24px; opacity:.7;}

/* LEASING */
.leasing-section {
  position:absolute;
  top:2800px;
  left:140px;
  right:140px;
  display:grid;
  grid-template-columns:1fr 1fr;
}

/* FOOTER */
.managed {
  position:absolute;
  bottom:180px;
  width:100%;
  text-align:center;
  font-size:52px;
  opacity:.7;
}
</style>
</head>

<body>

<div id="screen">

<div class="header">
  <div>
    <div class="title-line-1" id="building-number">110</div>
    <div class="title-line-2" id="building-street">29TH AVENUE</div>
    <div class="title-line-3" id="building-direction">NORTH</div>
  </div>

  <div class="meta">
    <div class="time" id="time">--:--</div>
    <div class="city" id="city">NASHVILLE TN</div>
    <div class="weather" id="weather">--</div>
  </div>
</div>

<div class="directory-shell" id="directory-list"></div>

<div class="leasing-section">
  <div>
    <div id="leasing-title">NOW LEASING</div>
    <div id="leasing-line-1"></div>
    <div id="leasing-highlight"></div>
    <div id="leasing-ideal-for-items"></div>
  </div>

  <div>
    <div id="contact-name"></div>
    <div id="contact-phone"></div>
    <div id="contact-email"></div>
  </div>
</div>

<div class="managed" id="managed-by-text">MANAGED BY</div>

</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1O_8s-4uoGnKGaWkPHQ2yYXStX1OVBjJsmK7DC3oYWJ4/export?format=csv";

/* LOAD SHEET */
function load(){
 fetch(URL + "&t=" + Date.now())
 .then(r=>r.text())
 .then(t=>{
   let lines = t.split("\n");
   let data = {};

   for(let i=1;i<lines.length;i++){
     let row = lines[i].split(",");

     let key = row[1];
     let value = row[3];

     if(key){
       key = key.replace(/"/g,'').trim();
       value = (value || "").replace(/"/g,'').trim();
       data[key] = value;
     }
   }

   apply(data);
 });
}

/* APPLY DATA */
function apply(d){

 // HEADER
 set("building-number", d.building_number);
 set("building-street", d.building_street);
 set("building-direction", d.building_direction);
 set("city", d.city);

 // LEASING
 set("leasing-title", d.leasing_title);
 set("leasing-line-1", d.leasing_line_1);
 set("leasing-highlight", d.leasing_highlight);
 set("leasing-ideal-for-items", d.leasing_ideal_for_items);

 // CONTACT
 set("contact-name", d.contact_name);
 set("contact-phone", d.contact_phone);
 set("contact-email", d.contact_email);

 // FOOTER
 set("managed-by-text", d.managed_by_text);

 // DIRECTORY
 let html="";
 for(let i=1;i<=3;i++){
  html+=`
   <div class="row">
    <div class="suite">${d["suite_"+i]||""}</div>
    <div class="tenant">${d["tenant_"+i]||""}
      <div class="sub">${(d["subtext_"+i]||"").replace("|","<br>")}</div>
    </div>
   </div>`;
 }

 document.getElementById("directory-list").innerHTML = html;
}

/* SET HELPER */
function set(id,val){
 if(val) document.getElementById(id).innerHTML = val;
}

/* TIME */
function updateTime(){
 let d=new Date();
 let h=d.getHours()%12||12;
 let m=("0"+d.getMinutes()).slice(-2);
 let am=d.getHours()>=12?"PM":"AM";
 document.getElementById("time").innerHTML=h+":"+m+" "+am;
}

/* INIT */
setInterval(load,5000);
setInterval(updateTime,1000);

load();
updateTime();
</script>

</body>
</html>
